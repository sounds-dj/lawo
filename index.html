                <div class="socials">${socialsHtml}</div>         </div>       </div>     </div>`;

            card.addEventListener('click', e => {

        // ── Audio des cartes avec clique ──
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let actx;
        function getCtx() { if (!actx) actx = new AudioCtx(); return actx; }
        const noteFreqs = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33];

        function playNote(i) {
            const ac = getCtx(), freq = noteFreqs[i % noteFreqs.length];
            const osc = ac.createOscillator(), gain = ac.createGain(), filt = ac.createBiquadFilter();
            filt.type = 'lowpass'; filt.frequency.value = 2000;
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, ac.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 1.5, ac.currentTime + .3);
            gain.gain.setValueAtTime(0, ac.currentTime);
            gain.gain.linearRampToValueAtTime(.3, ac.currentTime + .05);
            gain.gain.exponentialRampToValueAtTime(.001, ac.currentTime + 1.2);
            const o2 = ac.createOscillator(), g2 = ac.createGain();
            o2.type = 'sine'; o2.frequency.value = freq * 2;
            g2.gain.setValueAtTime(.1, ac.currentTime);
            g2.gain.exponentialRampToValueAtTime(.001, ac.currentTime + .8);
            osc.connect(filt); filt.connect(gain); gain.connect(ac.destination);
            o2.connect(g2); g2.connect(ac.destination);
            osc.start(); osc.stop(ac.currentTime + 1.2);
            o2.start(); o2.stop(ac.currentTime + .8);
        }

        // ── Ripple - ondulation 
        function createRipple(x, y, color) {
            const c = document.getElementById('rippleContainer');
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const r = document.createElement('div');
                    r.className = 'ripple';
                    r.style.cssText = `left:${x}px;top:${y}px;width:60px;height:60px;border-color:${color}`;
                    c.appendChild(r);
                    setTimeout(() => r.remove(), 1000);
                }, i * 150);
            }
        }

            const s = Math.random() * 6 + 2;

  <button id="lb-close" aria-label="Fermer">✕</button>
  <button id="lb-prev" aria-label="Précédent">&#8249;</button>

  <div id="lb-track-wrap">
    <div id="lb-track"></div>
  </div>
  <div id="lb-dots"></div>
`;
document.body.appendChild(lb);

let currentIndex = 0;

// ── Slide 1
const track  = document.getElementById('lb-track');
const dots   = document.getElementById('lb-dots');

posts.forEach((p, i) => {
  // slide
  const slide = document.createElement('div');
  slide.className = 'lb-slide';
  const img = document.createElement('img');
  img.src = p.photo;
  img.alt = p.legende || `Photo ${i + 1}`;
  slide.appendChild(img);
  track.appendChild(slide);

  // dot
  const dot = document.createElement('button');
  dot.className = 'lb-dot';
  dot.setAttribute('aria-label', `Photo ${i + 1}`);
  dot.addEventListener('click', () => goTo(i));
  dots.appendChild(dot);
});

function goTo(idx) {
  currentIndex = (idx + posts.length) % posts.length;
  track.style.transform = `translateX(-${currentIndex * 100}%)`;
  document.querySelectorAll('.lb-dot').forEach((d, i) =>
    d.classList.toggle('active', i === currentIndex)
  );
}

function openLightbox(idx) {
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
  goTo(idx);
}

function closeLightbox() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-overlay').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', () => goTo(currentIndex - 1));
document.getElementById('lb-next').addEventListener('click', () => goTo(currentIndex + 1));

// ── Keyboard
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  goTo(currentIndex - 1);
  if (e.key === 'ArrowRight') goTo(currentIndex + 1);
  if (e.key === 'Escape')     closeLightbox();
});

// ── Touch swipe mobile
let touchStartX = 0;
track.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
track.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) goTo(currentIndex + (dx < 0 ? 1 : -1));
});

    item.style.opacity = '1';
    item.style.transform = 'scale(1)';
  }, i * 100);

  const img = document.createElement('img');
  img.src = p.photo;
  img.alt = p.legende || `Photo ${i + 1}`;

  const overlay = document.createElement('div');
  overlay.className = 'galerie-overlay';
  overlay.innerHTML = `<span style="font-size:2.2rem;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));">🧡</span>`;

  item.appendChild(img);
  item.appendChild(overlay);
  galerieGrid.appendChild(item);

  const open = () => openLightbox(i);
  item.addEventListener('click', open);
  item.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') open(); });
});
